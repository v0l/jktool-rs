name: Build

on:
  push:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build for ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
          - arch: armv7
            target: armv7-unknown-linux-gnueabihf
            name: linux-armv7
          - arch: arm64
            target: aarch64-unknown-linux-gnu
            name: linux-aarch64
          - arch: i686
            target: i686-unknown-linux-gnu
            name: linux-i686

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and extract binary
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          targets: jktool
          build-args: |
            TARGET=${{ matrix.target }}
          outputs: type=local,dest=./output-${{ matrix.name }}

      - name: Rename binary
        run: |
          mkdir -p ./output-${{ matrix.name }}
          cp ./output-${{ matrix.name }}/jktool ./jktool-${{ matrix.name }} || cp ./output-${{ matrix.name }}/target/*/release/jktool ./jktool-${{ matrix.name }} || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jktool-${{ matrix.name }}
          path: jktool-${{ matrix.name }}
          retention-days: 30
